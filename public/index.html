.dpad-btn{position:absolute;width:40px;height:40px;background:rgba(255,255,255,.05);border:1px solid #333;color:#555;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}

// Game state
let player = { x: 0, y: 0, s: 8 };
let dx = 0, dy = 0;
let collectibles = [];
let enemies = [];
let score = 0;
let gameOver = false;
let frame = 0;

function pDir(x, y) { dx = x; dy = y; }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w') { dx=0; dy=-1; }
  if (e.key === 'ArrowDown' || e.key === 's') { dx=0; dy=1; }
  if (e.key === 'ArrowLeft' || e.key === 'a') { dx=-1; dy=0; }
  if (e.key === 'ArrowRight' || e.key === 'd') { dx=1; dy=0; }
  if (e.key === ' ' && gameOver) restart();
});

function restart() {
  player = { x: W/2, y: H/2, s: 8 };
  collectibles = [];
  enemies = [];
  score = 0;
  dx = dy = 0;
  gameOver = false;
  for (let i = 0; i < 5; i++) spawnC();
}

function spawnC() {
  collectibles.push({
    x: 40 + Math.random() * (W - 80),
    y: 40 + Math.random() * (H - 120),
    t: 0
  });
}

function spawnE() {
  const s = Math.floor(Math.random() * 4);
  let ex, ey, vx, vy;
  const spd = 1 + score * 0.05;
  if (s===0) { ex=-10; ey=Math.random()*H; vx=spd; vy=(Math.random()-.5)*spd; }
  else if (s===1) { ex=W+10; ey=Math.random()*H; vx=-spd; vy=(Math.random()-.5)*spd; }
  else if (s===2) { ex=Math.random()*W; ey=-10; vx=(Math.random()-.5)*spd; vy=spd; }
  else { ex=Math.random()*W; ey=H+10; vx=(Math.random()-.5)*spd; vy=-spd; }
  enemies.push({ x:ex, y:ey, vx, vy, s:6+Math.random()*4 });
}

// Init
player.x = W / 2;
player.y = H / 2;
for (let i = 0; i < 5; i++) spawnC();
setInterval(() => { if (!gameOver && enemies.length < 12 + score) spawnE(); }, 1500);

// Glitch system
function getGlitch(f) {
  const c = f % 300;
  if (c < 12) return Math.sin(c/12*Math.PI) * 0.9;
  if (c > 100 && c < 115) return Math.sin((c-100)/15*Math.PI) * 0.7;
  if (c > 200 && c < 218) return Math.sin((c-200)/18*Math.PI) * 1.0;
  return Math.random() * 0.015;
}

function glitchPass(g) {
  if (g < 0.05) return;

  // Horizontal slice displacement
  const slices = Math.floor(g * 20);
  for (let i = 0; i < slices; i++) {
    const y = Math.floor(Math.random() * H);
    const h = Math.min(1 + Math.floor(Math.random() * g * 40), H - y);
    const shift = Math.floor((Math.random() - 0.5) * g * 120);
    if (y > 0 && y + h < H) {
      try {
        const d = X.getImageData(0, y, W, h);
        X.putImageData(d, shift, y);
      } catch(e) {}
    }
  }

  // RGB channel split
  if (g > 0.2) {
    const shift = Math.floor(g * 12);
    try {
      const imgData = X.getImageData(0, 0, W, H);
      const copy = new Uint8ClampedArray(imgData.data);
      for (let i = 0; i < copy.length; i += 4) {
        const ri = Math.min(i + shift * 4, copy.length - 4);
        const bi = Math.max(i - shift * 4, 0);
        imgData.data[i] = Math.min(255, copy[ri] * 0.3 + copy[i] * 0.7);
        imgData.data[i+2] = Math.min(255, copy[bi+2] * 0.3 + copy[i+2] * 0.7);
      }
      X.putImageData(imgData, 0, 0);
    } catch(e) {}
  }

  // Block displacement
  if (g > 0.5) {
    const blocks = Math.floor(g * 6);
    for (let i = 0; i < blocks; i++) {
      const bx = Math.floor(Math.random() * W);
      const by = Math.floor(Math.random() * H);
      const bw = 30 + Math.floor(Math.random() * 100);
      const bh = 10 + Math.floor(Math.random() * 50);
      const ox = Math.floor((Math.random()-0.5) * g * 100);
      const oy = Math.floor((Math.random()-0.5) * g * 30);
      try {
        const d = X.getImageData(Math.max(0,bx), Math.max(0,by), Math.min(bw,W-bx), Math.min(bh,H-by));
        X.putImageData(d, bx+ox, by+oy);
      } catch(e) {}
    }
  }

  // Static noise
  if (g > 0.1) {
    const id = X.getImageData(0, 0, W, H);
    const d = id.data;
    const prob = g * 0.06;
    for (let i = 0; i < d.length; i += 20) {
      if (Math.random() < prob) {
        const v = Math.floor(Math.random() * g * 80);
        d[i] = Math.min(255, d[i]+v);
        d[i+1] = Math.min(255, d[i+1]+v);
        d[i+2] = Math.min(255, d[i+2]+v);
      }
    }
    X.putImageData(id, 0, 0);
  }

  // White flash
  if (g > 0.7 && Math.random() < 0.15) {
    X.fillStyle = `rgba(255,255,255,${g*0.07})`;
    X.fillRect(0, 0, W, H);
  }
}

// Scanlines
function scanlines() {
  X.fillStyle = 'rgba(0,0,0,0.12)';
  for (let y = 0; y < H; y += 3) X.fillRect(0, y, W, 1);
}

// VHS tracking line
function vhsLine(t) {
  const y = (t * 100) % (H + 200) - 100;
  X.fillStyle = 'rgba(255,255,255,0.02)';
  X.fillRect(0, y, W, 4);
  X.fillStyle = 'rgba(255,255,255,0.01)';
  X.fillRect(0, y + 6, W, 2);
}

// Vignette
function vignette() {
  const g = X.createRadialGradient(W/2, H/2, Math.min(W,H)*0.2, W/2, H/2, Math.max(W,H)*0.8);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.65)');
  X.fillStyle = g;
  X.fillRect(0, 0, W, H);
}

// Main loop
function loop() {
  frame++;
  const t = frame / 60;
  const g = getGlitch(frame);

  // Clear
  X.fillStyle = '#000';
  X.fillRect(0, 0, W, H);

  // Subtle grid
  X.strokeStyle = 'rgba(255,255,255,0.015)';
  X.lineWidth = 1;
  const gs = 30;
  for (let x = 0; x < W; x += gs) { X.beginPath(); X.moveTo(x,0); X.lineTo(x,H); X.stroke(); }
  for (let y = 0; y < H; y += gs) { X.beginPath(); X.moveTo(0,y); X.lineTo(W,y); X.stroke(); }

  // --- Logo ---
  if (logoReady) {
    const logoSize = Math.min(W * 0.35, H * 0.35, 280);
    const lx = (W - logoSize) / 2;
    const ly = H * 0.22;

    // Glow
    const grd = X.createRadialGradient(W/2, ly + logoSize/2, 0, W/2, ly + logoSize/2, logoSize);
    grd.addColorStop(0, 'rgba(255,255,255,0.03)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    X.fillStyle = grd;
    X.fillRect(0, 0, W, H);

    X.drawImage(logoImg, lx, ly, logoSize, logoSize);
  }

  // --- Under Construction text ---
  X.font = Math.min(14, W * 0.018) + 'px "Press Start 2P"';
  X.fillStyle = '#fff';
  X.textAlign = 'center';

  // Blink effect
  if (Math.floor(t * 1.2) % 2 === 0) {
    X.fillText('[ UNDER CONSTRUCTION ]', W/2, H * 0.65);
  }

  X.font = Math.min(8, W * 0.01) + 'px "Press Start 2P"';
  X.fillStyle = '#444';
  X.fillText('WHERE AI MEETS IMAGINATION', W/2, H * 0.7);

  // Timer to 11:11
  const now = new Date();
  let target = new Date(now);
  const hh = now.getHours(), mm = now.getMinutes();
  if (hh < 11 || (hh === 11 && mm < 11)) target.setHours(11, 11, 0, 0);
  else if (hh < 23 || (hh === 23 && mm < 11)) target.setHours(23, 11, 0, 0);
  else { target.setDate(target.getDate() + 1); target.setHours(11, 11, 0, 0); }
  let diff = Math.max(0, Math.floor((target - now) / 1000));
  const th = String(Math.floor(diff/3600)).padStart(2,'0');
  const tm = String(Math.floor((diff%3600)/60)).padStart(2,'0');
  const ts = String(diff%60).padStart(2,'0');

  X.font = Math.min(10, W * 0.012) + 'px "Press Start 2P"';
  X.fillStyle = '#333';
  X.fillText('NEXT 11:11 IN ' + th + ':' + tm + ':' + ts, W/2, H * 0.74);

  // Score
  X.font = Math.min(9, W * 0.011) + 'px "Press Start 2P"';
  X.fillStyle = '#555';
  X.textAlign = 'right';
  X.fillText('SCORE: ' + score, W - 20, 30);

  // --- Game Logic ---
  if (!gameOver) {
    player.x += dx * 3;
    player.y += dy * 3;
    player.x = Math.max(0, Math.min(W - player.s, player.x));
    player.y = Math.max(0, Math.min(H - player.s, player.y));

    enemies.forEach(e => { e.x += e.vx; e.y += e.vy; });
    enemies = enemies.filter(e => e.x > -50 && e.x < W+50 && e.y > -50 && e.y < H+50);

    enemies.forEach(e => {
      if (Math.abs(player.x - e.x) < 10 && Math.abs(player.y - e.y) < 10) gameOver = true;
    });

    collectibles = collectibles.filter(c => {
      if (Math.abs(player.x - c.x) < 14 && Math.abs(player.y - c.y) < 14) {
        score++;
        spawnC();
        return false;
      }
      c.t++;
      return true;
    });
  }

  // Draw collectibles (blinking)
  collectibles.forEach(c => {
    if (Math.floor(c.t / 20) % 2 === 0) {
      X.fillStyle = '#fff';
      X.fillRect(c.x, c.y, 6, 6);
    }
  });

  // Draw enemies
  X.fillStyle = '#555';
  enemies.forEach(e => X.fillRect(e.x, e.y, e.s, e.s));

  // Draw player
  X.fillStyle = '#fff';
  X.fillRect(player.x, player.y, player.s, player.s);
  // Trail
  X.fillStyle = 'rgba(255,255,255,0.08)';
  X.fillRect(player.x - dx*4, player.y - dy*4, player.s, player.s);
  X.fillRect(player.x - dx*8, player.y - dy*8, player.s, player.s);

  if (gameOver) {
    X.fillStyle = 'rgba(0,0,0,0.5)';
    X.fillRect(0, 0, W, H);
    X.textAlign = 'center';
    X.font = '16px "Press Start 2P"';
    X.fillStyle = '#fff';
    X.fillText('GAME OVER', W/2, H/2);
    X.font = '8px "Press Start 2P"';
    X.fillText('SCORE: ' + score, W/2, H/2 + 30);
    X.fillStyle = '#666';
    X.fillText('PRESS SPACE TO RESTART', W/2, H/2 + 55);
  }

  // --- Post FX ---
  glitchPass(g);
  scanlines();
  vhsLine(t);
  vignette();

  // Floating pixels
  for (let i = 0; i < 8; i++) {
    const px = (Math.sin(t*0.3+i*2.3)*0.5+0.5)*W;
    const py = (Math.cos(t*0.2+i*1.5)*0.5+0.5)*H;
    X.globalAlpha = 0.04 + Math.sin(t*2+i)*0.02;
    X.fillStyle = '#fff';
    X.fillRect(px, py, 3, 3);
  }
  X.globalAlpha = 1;

  // Footer
  X.textAlign = 'center';
  X.font = '6px "Press Start 2P"';
  X.fillStyle = '#222';
  X.fillText('© 2026 ELEVEN11 AI | DUBAI, UAE', W/2, H - 8);

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
